<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ACA Agent Scenario Planner</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #172033;
      --muted: #64748b;
      --border: #d9e2f0;
      --primary: #2563eb;
      --good: #15803d;
      --warn: #b45309;
      --bad: #b91c1c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }
    h1 { margin: 0 0 8px; font-size: 32px; }
    .sub { color: var(--muted); margin-bottom: 24px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 20px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }
    .section-title { margin: 0 0 16px; font-size: 20px; }
    .field { margin-bottom: 14px; }
    label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    input, select {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      font-size: 15px;
      background: #fff;
    }
    .full { grid-column: 1 / -1; }
    .btns { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; }
    button {
      border: 0;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    .primary { background: var(--primary); color: white; }
    .secondary { background: #e2e8f0; color: var(--text); }
    .results {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .metric { display: flex; justify-content: space-between; gap: 12px; padding: 10px 0; border-bottom: 1px solid #eef2f7; }
    .metric:last-child { border-bottom: 0; }
    .badge { padding: 6px 10px; border-radius: 999px; font-weight: 700; font-size: 12px; display: inline-block; }
    .good { background: #dcfce7; color: var(--good); }
    .warn { background: #fef3c7; color: var(--warn); }
    .bad { background: #fee2e2; color: var(--bad); }
    .note { color: var(--muted); font-size: 14px; line-height: 1.5; }
    .summary-box { margin-top: 20px; }
    @media (max-width: 900px) {
      .grid, .results { grid-template-columns: 1fr; }
      .full { grid-column: auto; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>ACA Agent Scenario Planner</h1>
    <div class="sub">Compare 2 good-faith income scenarios, show estimated subsidy difference, CSR tier, and year-end repayment exposure.</div>

    <div class="grid">
      <div class="card full">
        <h2 class="section-title">Household Inputs</h2>
        <div class="grid">
          <div class="field">
            <label for="householdSize">Household Size</label>
            <input id="householdSize" type="number" min="1" value="3" />
          </div>
          <div class="field">
            <label for="filingStatus">Filing Status</label>
            <select id="filingStatus">
              <option>Single</option>
              <option selected>Married Filing Jointly</option>
              <option>Head of Household</option>
            </select>
          </div>
          <div class="field">
            <label for="benchmarkPremium">Estimated Annual Benchmark Premium</label>
            <input id="benchmarkPremium" type="number" min="0" value="26400" />
          </div>
          <div class="field">
            <label for="monthsCovered">Months Covered</label>
            <input id="monthsCovered" type="number" min="1" max="12" value="12" />
          </div>
          <div class="field full">
            <label for="actualIncome">Optional Actual Year End Income</label>
            <input id="actualIncome" type="number" min="0" value="90000" />
          </div>
        </div>
      </div>

      <div class="card">
        <h2 class="section-title">Scenario A</h2>
        <div class="field">
          <label for="incomeA">Projected Income A</label>
          <input id="incomeA" type="number" min="0" value="49000" />
        </div>
      </div>

      <div class="card">
        <h2 class="section-title">Scenario B</h2>
        <div class="field">
          <label for="incomeB">Projected Income B</label>
          <input id="incomeB" type="number" min="0" value="90000" />
        </div>
      </div>

      <div class="card full">
        <div class="btns">
          <button class="primary" onclick="runCalc()">Calculate</button>
          <button class="secondary" onclick="fillExample()">Load Example</button>
        </div>
      </div>
    </div>

    <div class="results">
      <div class="card" id="resultA"></div>
      <div class="card" id="resultB"></div>
    </div>

    <div class="card summary-box" id="comparison"></div>
  </div>

  <script>
    const FPL_2025 = {1: 15650, 2: 21150, 3: 26650, 4: 32150, 5: 37650, 6: 43150, 7: 48650, 8: 54150};
    function getFPL(size) {
      if (size <= 8) return FPL_2025[size];
      return 54150 + ((size - 8) * 5500);
    }
    function csrTier(fplPct) {
      if (fplPct >= 100 && fplPct <= 150) return '94 CSR';
      if (fplPct > 150 && fplPct <= 200) return '87 CSR';
      if (fplPct > 200 && fplPct <= 250) return '73 CSR';
      return 'No CSR';
    }
    function applicablePct(fplPct) {
      if (fplPct < 100) return 0;
      if (fplPct <= 150) return 0.00;
      if (fplPct <= 200) return 0.02;
      if (fplPct <= 250) return 0.04;
      if (fplPct <= 300) return 0.06;
      if (fplPct <= 400) return 0.085;
      return 1;
    }
    function fmtMoney(n) {
      return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(Math.max(0, n || 0));
    }
    function fmtPct(n) {
      return (n || 0).toFixed(1) + '%';
    }
    function calcScenario(projectedIncome, householdSize, benchmarkAnnual, monthsCovered) {
      const fpl = getFPL(householdSize);
      const fplPct = (projectedIncome / fpl) * 100;
      const appPct = applicablePct(fplPct);
      const expectedContribution = projectedIncome * appPct;
      const annualAptc = Math.max(0, benchmarkAnnual - expectedContribution);
      const monthlyAptc = annualAptc / monthsCovered;
      const netMonthlyPremium = Math.max(0, (benchmarkAnnual / monthsCovered) - monthlyAptc);
      return { projectedIncome, fplPct, expectedContribution, annualAptc, monthlyAptc, netMonthlyPremium, c: csrTier(fplPct) };
    }
    function cardHtml(title, r) {
      const badgeClass = r.c === 'No CSR' ? 'bad' : (r.c === '73 CSR' ? 'warn' : 'good');
      return `
        <h2 class="section-title">${title}</h2>
        <div class="metric"><span>Projected Income</span><strong>${fmtMoney(r.projectedIncome)}</strong></div>
        <div class="metric"><span>FPL %</span><strong>${fmtPct(r.fplPct)}</strong></div>
        <div class="metric"><span>CSR Tier</span><span class="badge ${badgeClass}">${r.c}</span></div>
        <div class="metric"><span>Expected Annual Contribution</span><strong>${fmtMoney(r.expectedContribution)}</strong></div>
        <div class="metric"><span>Estimated Monthly APTC</span><strong>${fmtMoney(r.monthlyAptc)}</strong></div>
        <div class="metric"><span>Estimated Annual APTC</span><strong>${fmtMoney(r.annualAptc)}</strong></div>
        <div class="metric"><span>Estimated Net Monthly Premium</span><strong>${fmtMoney(r.netMonthlyPremium)}</strong></div>
      `;
    }
    function runCalc() {
      const householdSize = Number(document.getElementById('householdSize').value);
      const benchmarkAnnual = Number(document.getElementById('benchmarkPremium').value);
      const monthsCovered = Number(document.getElementById('monthsCovered').value);
      const actualIncome = Number(document.getElementById('actualIncome').value || 0);
      const incomeA = Number(document.getElementById('incomeA').value);
      const incomeB = Number(document.getElementById('incomeB').value);
      const a = calcScenario(incomeA, householdSize, benchmarkAnnual, monthsCovered);
      const b = calcScenario(incomeB, householdSize, benchmarkAnnual, monthsCovered);
      document.getElementById('resultA').innerHTML = cardHtml('Scenario A', a);
      document.getElementById('resultB').innerHTML = cardHtml('Scenario B', b);

      let extra = '';
      if (actualIncome > 0) {
        const actual = calcScenario(actualIncome, householdSize, benchmarkAnnual, monthsCovered);
        const repayA = Math.max(0, a.annualAptc - actual.annualAptc);
        const repayB = Math.max(0, b.annualAptc - actual.annualAptc);
        extra = `
          <div class="metric"><span>Actual Income Used for Risk Check</span><strong>${fmtMoney(actualIncome)}</strong></div>
          <div class="metric"><span>Correct Annual APTC at Actual Income</span><strong>${fmtMoney(actual.annualAptc)}</strong></div>
          <div class="metric"><span>Scenario A Estimated Payback</span><strong>${fmtMoney(repayA)}</strong></div>
          <div class="metric"><span>Scenario B Estimated Payback</span><strong>${fmtMoney(repayB)}</strong></div>
        `;
      }

      document.getElementById('comparison').innerHTML = `
        <h2 class="section-title">Comparison Summary</h2>
        <div class="metric"><span>Monthly Subsidy Difference</span><strong>${fmtMoney(Math.abs(a.monthlyAptc - b.monthlyAptc))}</strong></div>
        <div class="metric"><span>Annual Subsidy Difference</span><strong>${fmtMoney(Math.abs(a.annualAptc - b.annualAptc))}</strong></div>
        <div class="metric"><span>Monthly Premium Difference</span><strong>${fmtMoney(Math.abs(a.netMonthlyPremium - b.netMonthlyPremium))}</strong></div>
        <div class="metric"><span>CSR Change</span><strong>${a.c} vs ${b.c}</strong></div>
        ${extra}
        <p class="note">Estimate only. This simple website version is for agent planning and quoting. It is not exact tax advice and is not a full Form 8962 calculator.</p>
      `;
    }
    function fillExample() {
      document.getElementById('householdSize').value = 3;
      document.getElementById('benchmarkPremium').value = 26400;
      document.getElementById('monthsCovered').value = 12;
      document.getElementById('actualIncome').value = 90000;
      document.getElementById('incomeA').value = 49000;
      document.getElementById('incomeB').value = 90000;
      runCalc();
    }
    runCalc();
  </script>
</body>
</html>
